packages:
  - "apps/*"
  - "packages/*"

# Trusted native deps allowed to run install/build scripts:
#   sharp         – Next.js image optimization (prebuilt binaries)
#   unrs-resolver – fast module resolution used by eslint-config-next
allowBuilds:
  sharp: true
  unrs-resolver: true
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
