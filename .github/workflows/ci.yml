name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pinned packageManager (pnpm@x) from package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

      # Local Supabase stack (Docker is available on GitHub-hosted runners).
      # `supabase start` applies supabase/migrations and seeds supabase/seed.sql.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.106.0
      - run: pnpm supabase start

      - name: Export local Supabase env for tests
        # tee writes the same creds to web (anon-backed render tests),
        # packages/sync (service_role sync integration test), and
        # apps/scan (service_role + anon scan integration test).
        run: |
          pnpm -s supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | tee apps/web/.env.test packages/sync/.env.test apps/scan/.env.test > /dev/null

      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kinnso/e2e e2e:install

      - uses: supabase/setup-cli@v1
        with:
          version: 2.106.0
      - run: pnpm supabase start

      - name: Export local Supabase env for apps/web and apps/scan
        run: |
          pnpm -s supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            | tee apps/web/.env.local > /dev/null
          echo "NEXT_PUBLIC_SCAN_URL=http://localhost:8788" >> apps/web/.env.local
          pnpm -s supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | tee apps/scan/.env.local > /dev/null

      - name: Start scan worker (fixture mode) and web app
        run: |
          # tsx src/server.ts reads process.env directly (no dotenv), unlike
          # `next dev` which auto-loads .env.local — so export the worker's env here.
          set -a
          . ./apps/scan/.env.local
          set +a
          SCAN_FIXTURE_MODE=1 pnpm --filter @kinnso/scan-app start &
          pnpm --filter web dev &
          npx --yes wait-on http://localhost:8788/health http://localhost:3000

      - name: Run onboarding journey
        env:
          E2E_BASE_URL: http://localhost:3000
        run: pnpm --filter @kinnso/e2e e2e creator-onboarding

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: |
            apps/e2e/test-results/
            apps/e2e/playwright-report/
